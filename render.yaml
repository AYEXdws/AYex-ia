services:
  - type: web
    name: ayex-ia
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run_server.py
    envVars:
      - key: AYEX_WEB_MVP_ONLY
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AYEX_CHAT_MODEL
        value: claude-haiku-4.5
      - key: AYEX_REASONING_MODEL
        value: claude-sonnet-4.6
      - key: AYEX_POWER_MODEL
        value: gpt-5
      - key: AYEX_FAST_MODEL
        value: gpt-4o-mini
      - key: AYEX_MODEL_MAX_OUTPUT_TOKENS
        value: "320"
      - key: AYEX_MODEL_CONTEXT_TURNS
        value: "6"
      - key: AYEX_MODEL_CACHE_TTL_SEC
        value: "45"
      - key: AYEX_MODEL_CACHE_SIZE
        value: "128"
      - key: AYEX_DAILY_REQUEST_LIMIT
        value: "350"
      - key: AYEX_DAILY_INPUT_CHAR_LIMIT
        value: "120000"
