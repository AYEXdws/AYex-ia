name: backend-ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Syntax check
        run: |
          python -m py_compile $(find backend/src -name '*.py' -type f | tr '\n' ' ')

      - name: Lint
        run: |
          ruff check backend/src backend/tests --select E9,F63,F7,F82

      - name: Tests
        run: |
          pytest backend/tests -q
